# ============================================================
# docker-compose.yml — Full ML System Stack
#
# Services:
#   db        — PostgreSQL (prediction logging)
#   api       — FastAPI ML prediction server
#   mlflow    — Experiment tracking UI
#   prometheus — Metrics scraping
#   grafana   — Dashboards
#
# Start everything:
#   docker compose up --build
#
# Start just API + DB:
#   docker compose up api db
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: fraud_credit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: fraud_credit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d fraud_credit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ML API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://mluser:mlpassword@db:5432/fraud_credit_db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOG_LEVEL=INFO
    volumes:
      # Mount outputs so trained models persist outside the container
      - ./outputs:/app/outputs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MLflow Tracking Server ────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://mluser:mlpassword@db:5432/fraud_credit_db
        --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - api

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus


# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
